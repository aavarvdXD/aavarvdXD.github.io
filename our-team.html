<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Team - Qorym</title>

    <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Iosevka Charon", monospace;
            background: linear-gradient(35deg, #4a7dbc, #0F172A);
            color: white;
            line-height: 1.6;
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid #1f2937;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            text-decoration: none;
            color: white;
        }

        .navlinks a {
            color: #9ca3af;
            text-decoration: none;
            margin-left: 25px;
            font-size: 14px;
        }

        .navlinks a:hover,
        .navlinks .active {
            color: white;
        }

        .section {
            max-width: 1000px;
            margin: auto;
            padding: 80px 20px;
        }

        .section h1 {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .section p {
            color: #9ca3af;
            margin-bottom: 30px;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            margin-top: 15px;
        }

        .member {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            overflow: hidden;
        }

        .member img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
        }

        .member-info {
            padding: 20px;
        }

        .member-info h2 {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .member-info p {
            margin-bottom: 0;
            color: #a2a7b1;
            font-size: 14px;
        }

        .footer {
            text-align: center;
            padding: 35px;
            border-top: 1px solid #1f2937;
            color: #a2a7b1;
            font-size: 13px;
            margin-top: 70px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="logo" href="index.html">Qorym</a>
    <div class="navlinks">
        <a class="active" href="our-team.html">Our Team</a>
        <a href="#">Documentation</a>
        <a href="index.html#branches">Our Branches</a>
    </div>
</nav>

<section class="section">
    <h1>Our Team</h1>
    <p>The core people behind Qorym.</p>

    <div class="team-grid">
        <article class="member">
            <img src="photo.png" alt="aavarvd portrait">
            <div class="member-info">
                <h2>aavarvd</h2>
                <p>Studio Founder and Main Programmer</p>
            </div>
        </article>
    </div>
</section>

<footer class="footer">
    <p>Qorym • Everything you need</p>
    <p>Copyright © 2026 Qorym Studios</p>
</footer>

</body>
</html>
